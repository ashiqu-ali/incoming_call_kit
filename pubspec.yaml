name: incoming_call_kit
description: "Native incoming, outgoing & missed call UI for Flutter. Full-screen Activity on Android, CallKit on iOS. SDK-agnostic."
version: 0.0.1
homepage: https://github.com/ashiqu-ali/incoming_call_kit

screenshots:
  - description: 'Full-screen incoming call UI with avatar, caller info, and accept/decline buttons'
    path: assets/incoming_screen.png
  - description: 'Incoming call notification with CallStyle (API 31+) showing caller name and quick-action buttons'
    path: assets/incoming_notification.png

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.ashiquali.incoming_call_kit
        pluginClass: IncomingCallKitPlugin
      ios:
        pluginClass: IncomingCallKitPlugin
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

